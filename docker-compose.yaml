version: '3.8'

services:
  grafana:
    image: grafana/grafana:12.0.2
    container_name: grafana-scene3d-panel-demo
    ports:
      - "3000:3000"
    environment:
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "neketezhow-scene3ddemo-panel"
      GF_LOG_LEVEL: "debug"
    volumes:
      - ./dist:/var/lib/grafana/plugins/neketezhow-scene3ddemo-panel
    restart: unless-stopped
